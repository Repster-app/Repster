<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reppo Live Activity Widgets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    background: #111;
    color: #fff;
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-align: center;
  }
  h1 span { color: #888; font-weight: 400; font-size: 16px; display: block; margin-top: 4px; }

  .section {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
  }

  /* ── SVG icon helpers ── */
  .sf-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── Lock Screen Widget ── */
  .lock-screen-widget {
    background: rgba(0,0,0,0.7);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .lock-screen-widget .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .lock-screen-widget .workout-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }
  .lock-screen-widget .elapsed {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    font-variant-numeric: tabular-nums;
  }
  .lock-screen-widget .exercise-name {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.2px;
  }
  .lock-screen-widget .set-info {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }
  .lock-screen-widget .set-count {
    font-size: 15px;
    font-weight: 500;
    color: #fff;
  }
  .lock-screen-widget .set-type {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
  }

  /* Rest timer row */
  .rest-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .rest-row .timer-text {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .rest-row .remaining {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-left: auto;
  }
  .rest-row .blue { color: #007AFF; }
  .rest-row .secondary {
    color: rgba(255,255,255,0.55);
    font-size: 12px;
  }
  .rest-complete {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }
  .rest-complete .label {
    font-size: 15px;
    font-weight: 700;
    color: #34C759;
  }
  .go-btn {
    margin-left: auto;
    background: #34C759;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
  }

  /* ── Dynamic Island ── */
  .di-compact {
    background: #000;
    border-radius: 22px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 190px;
    align-self: center;
    min-height: 36px;
  }
  .di-compact .leading { color: #007AFF; display: flex; align-items: center; }
  .di-compact .trailing {
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #fff;
  }
  .di-compact .trailing.blue { color: #007AFF; }

  .di-minimal {
    background: #000;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    color: #007AFF;
  }

  .di-expanded {
    background: #000;
    border-radius: 26px;
    padding: 14px 18px;
    width: 350px;
    max-width: 100%;
    align-self: center;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .di-expanded .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .di-expanded .left { display: flex; flex-direction: column; gap: 2px; }
  .di-expanded .right { display: flex; flex-direction: column; gap: 2px; text-align: right; }
  .di-expanded .caption {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    font-variant-numeric: tabular-nums;
  }
  .di-expanded .subhead {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }
  .di-expanded .bottom-rest {
    display: flex;
    align-items: center;
    gap: 5px;
    padding-top: 2px;
  }

  /* ── State tabs ── */
  .state-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .state-tab {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid #333;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s;
  }
  .state-tab:hover { border-color: #555; color: #fff; }
  .state-tab.active { background: #007AFF; border-color: #007AFF; color: #fff; }

  /* ── iOS comparison ── */
  .comparison {
    display: flex;
    gap: 24px;
    width: 100%;
    max-width: 820px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .comparison-col {
    flex: 1;
    min-width: 300px;
    max-width: 390px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .ios-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    padding: 5px 12px;
    border-radius: 6px;
  }
  .ios-17 { color: #FF9F0A; background: rgba(255,159,10,0.1); }
  .ios-26 { color: #BF5AF2; background: rgba(191,90,242,0.1); }

  /* Wallpaper backgrounds */
  .wallpaper-17 {
    border-radius: 20px;
    padding: 20px 14px;
    position: relative;
    overflow: hidden;
    /* Blurry photo-like bg */
    background:
      linear-gradient(135deg,
        rgba(140,120,100,0.6) 0%,
        rgba(90,80,70,0.7) 30%,
        rgba(60,55,50,0.8) 60%,
        rgba(100,90,80,0.6) 100%
      ),
      linear-gradient(200deg, #8b7355, #5a4a3a, #3c3530);
    background-blend-mode: overlay;
  }
  .wallpaper-26 {
    border-radius: 20px;
    padding: 20px 14px;
    background: linear-gradient(145deg, #6a3093, #a044ff, #00b4d8);
  }

  /* Liquid glass */
  .glass-bg {
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.06));
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 0.5px solid rgba(255,255,255,0.2);
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.15), 0 2px 16px rgba(0,0,0,0.2);
  }
  .glass-bg .workout-title { font-size: 15px; font-weight: 600; color: #fff; }
  .glass-bg .elapsed { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.65); font-variant-numeric: tabular-nums; }
  .glass-bg .exercise-name { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .glass-bg .set-count { font-size: 15px; font-weight: 500; color: #fff; }
  .glass-bg .set-type { font-size: 12px; color: rgba(255,255,255,0.65); }
  .glass-bg .row { display: flex; justify-content: space-between; align-items: baseline; }
  .glass-bg .set-info { display: flex; align-items: baseline; gap: 5px; }
</style>
</head>
<body>

<h1>Reppo Live Activity Widgets<span>Current implementation overview</span></h1>

<!-- State selector -->
<div class="state-tabs" id="stateTabs">
  <button class="state-tab active" data-state="ready">Ready for Set</button>
  <button class="state-tab" data-state="resting">Rest Timer</button>
  <button class="state-tab" data-state="complete">Rest Complete</button>
</div>

<!-- iOS 17 vs iOS 26 comparison -->
<div class="comparison">
  <div class="comparison-col">
    <div class="ios-label ios-17">iOS 17 &mdash; Dark Scheme</div>
    <div class="wallpaper-17">
      <div class="lock-screen-widget" id="lock17"></div>
    </div>
  </div>
  <div class="comparison-col">
    <div class="ios-label ios-26">iOS 26 &mdash; Liquid Glass</div>
    <div class="wallpaper-26">
      <div class="glass-bg" id="lock26"></div>
    </div>
  </div>
</div>

<!-- Dynamic Island -->
<div class="section">
  <div class="section-title">Dynamic Island &mdash; Compact</div>
  <div id="diCompact" style="display:flex;flex-direction:column;align-items:center;gap:8px;"></div>

  <div class="section-title" style="margin-top:16px;">Dynamic Island &mdash; Expanded</div>
  <div id="diExpanded" style="display:flex;justify-content:center;"></div>

  <div class="section-title" style="margin-top:16px;">Dynamic Island &mdash; Minimal</div>
  <div style="display:flex;justify-content:center;">
    <div class="di-minimal">${svgDumbbell('#007AFF', 16)}</div>
  </div>
</div>

<script>
// SF Symbol-style SVG icons
function svgDumbbell(color, size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none">
    <rect x="2" y="9" width="3" height="6" rx="1" fill="${color}"/>
    <rect x="19" y="9" width="3" height="6" rx="1" fill="${color}"/>
    <rect x="5" y="7" width="3" height="10" rx="1.2" fill="${color}"/>
    <rect x="16" y="7" width="3" height="10" rx="1.2" fill="${color}"/>
    <rect x="8" y="10.5" width="8" height="3" rx="1" fill="${color}"/>
  </svg>`;
}

function svgTimer(color, size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 20 20" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round">
    <circle cx="10" cy="11" r="7"/>
    <line x1="10" y1="11" x2="10" y2="7.5"/>
    <line x1="10" y1="2" x2="10" y2="4"/>
  </svg>`;
}

function svgArrowCircle(color, size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 20 20" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10" cy="10" r="7.5"/>
    <line x1="7" y1="10" x2="13" y2="10"/>
    <polyline points="11,7.5 13,10 11,12.5"/>
  </svg>`;
}

function svgCheckCircle(color, size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 22 22" fill="${color}">
    <circle cx="11" cy="11" r="10"/>
    <polyline points="7,11 10,14 15,8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

const sec = 'rgba(255,255,255,0.55)';
const sec26 = 'rgba(255,255,255,0.65)';

const states = {
  ready: {
    exerciseName: 'Bulgarian Split Squat',
    currentSet: 2, totalSets: 4, setType: 'working',
    elapsed: '0.13',
    restRow: (s) => `<div class="rest-row">
      <span class="sf-icon">${svgArrowCircle(s, 14)}</span>
      <span style="color:${s};font-size:12px;">Ready for next set</span>
    </div>`,
    diTrailing: `<span class="trailing">2/4</span>`,
    diBottom: () => `<div class="bottom-rest">
      <span class="sf-icon">${svgArrowCircle('rgba(255,255,255,0.6)', 14)}</span>
      <span style="color:rgba(255,255,255,0.6);font-size:12px;">Ready for next set</span>
    </div>`,
  },
  resting: {
    exerciseName: '1 Leg Deadlift',
    currentSet: 2, totalSets: 2, setType: 'working',
    elapsed: '0.13',
    restRow: (s) => `<div class="rest-row">
      <span class="sf-icon">${svgTimer('#007AFF', 14)}</span>
      <span class="timer-text blue">2.27</span>
      <span class="remaining" style="color:${s}">remaining</span>
    </div>`,
    diTrailing: `<span class="trailing blue">2.27</span>`,
    diBottom: () => `<div class="bottom-rest">
      <span class="sf-icon">${svgTimer('#007AFF', 14)}</span>
      <span class="timer-text blue" style="font-size:13px;">2.27</span>
      <span style="color:rgba(255,255,255,0.6);font-size:11px;margin-left:auto;">remaining</span>
    </div>`,
  },
  complete: {
    exerciseName: 'Deadlift',
    currentSet: 1, totalSets: 3, setType: 'warmup',
    elapsed: '8.42',
    restRow: () => `<div class="rest-complete">
      <span class="sf-icon">${svgCheckCircle('#34C759', 22)}</span>
      <span class="label">REST COMPLETE</span>
      <div class="go-btn">GO</div>
    </div>`,
    diTrailing: `<span class="trailing">1/3</span>`,
    diBottom: () => `<div class="bottom-rest">
      <span class="sf-icon">${svgCheckCircle('#34C759', 22)}</span>
      <span style="font-size:15px;font-weight:700;color:#34C759;">REST COMPLETE</span>
      <div class="go-btn" style="margin-left:auto;">GO</div>
    </div>`,
  },
};

function lockHTML(s, secondaryColor) {
  return `
    <div class="row">
      <span class="workout-title">Afternoon Workout</span>
      <span class="elapsed">${s.elapsed}</span>
    </div>
    <div class="row">
      <span class="exercise-name">${s.exerciseName}</span>
      <div class="set-info">
        <span class="set-count">Set ${s.currentSet}/${s.totalSets}</span>
        <span class="set-type">(${s.setType})</span>
      </div>
    </div>
    ${s.restRow(secondaryColor)}
  `;
}

function render(stateKey) {
  const s = states[stateKey];

  document.getElementById('lock17').innerHTML = lockHTML(s, sec);
  document.getElementById('lock26').innerHTML = lockHTML(s, sec26);

  document.getElementById('diCompact').innerHTML = `
    <div class="di-compact">
      <span class="leading">${svgDumbbell('#007AFF', 16)}</span>
      ${s.diTrailing}
    </div>
  `;

  document.getElementById('diExpanded').innerHTML = `
    <div class="di-expanded">
      <div class="top-row">
        <div class="left">
          <span class="caption">Afternoon Workout</span>
          <span class="subhead">${s.exerciseName}</span>
        </div>
        <div class="right">
          <span class="caption">${s.elapsed}</span>
          <span class="subhead">Set ${s.currentSet}/${s.totalSets}</span>
        </div>
      </div>
      ${s.diBottom()}
    </div>
  `;
}

// Fix minimal DI icon (rendered from template literal in HTML)
document.querySelector('.di-minimal').innerHTML = svgDumbbell('#007AFF', 16);

// Tab switching
document.getElementById('stateTabs').addEventListener('click', e => {
  const tab = e.target.closest('.state-tab');
  if (!tab) return;
  document.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  render(tab.dataset.state);
});

render('resting');
</script>
</body>
</html>
